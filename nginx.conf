events { worker_connections 1024; }

http {
  # Upstreams on the compose network
  upstream api_upstream { server api:3000; }
  upstream web_upstream { server web:5173; }
  upstream truskett_wp_upstream { server truskett-wp:80; }

  # WordPress staging for Truskett Law. Exact server_name wins over the
  # *.mcwdevs.com catch-all below, so only this host hits WordPress.
  server {
    listen 80;
    server_name truskett.mcwdevs.com;
    client_max_body_size 64m;

    location / {
      proxy_pass http://truskett_wp_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name mcwdevs.com *.mcwdevs.com 142.93.119.251 _;

    # Allow photo uploads (item: photo manager, up to 10MB files + multipart overhead)
    client_max_body_size 25m;

    # API and public onboarding (brain-injection) endpoints go straight to Express
    location /api {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /onboarding {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Vite web dev server. proxy_http_version 1.1 + Upgrade
    # headers keep the HMR websocket alive through the proxy.
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
